name: E2E Tests

on:
  workflow_dispatch: # Только ручной запуск — НЕ на каждый PR

jobs:
  e2e:
    runs-on: self-hosted # Self-hosted runner с предустановленным Lemonade
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run E2E tests
        run: npm run test:e2e