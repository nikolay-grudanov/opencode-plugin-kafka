# Testcontainers configuration для Podman
# Системный сокет: systemctl start podman
# Пользовательский сокет: systemctl --user start podman.socket

# Отключаем Ryuk reaper (не работает с Podman rootless)
ryuk.disabled=true

# Podman user socket path (rootless)
# Если UID отличается от 1000, переопределите через env:
#   export DOCKER_HOST=unix:///run/user/$(id -u)/podman/podman.sock
docker.host=unix:///run/user/1000/podman/podman.sock

# Явное указание Unix socket strategy
docker.client.strategy=org.testcontainers.dockerclient.UnixSocketClientProviderStrategy